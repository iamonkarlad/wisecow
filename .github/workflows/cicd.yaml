# GitHub Actions Workflow

name: Build and Deploy Wisecow

on:
  push:
    branches:
      - main

jobs:

  # JOB 1: Build Docker image and push to DockerHub
  
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/wisecow:latest
            ${{ secrets.DOCKER_USERNAME }}/wisecow:${{ github.sha }}

  
  # JOB 2: Deploy to Kind Kubernetes cluster
  
  deploy:
    name: Deploy to Kubernetes (Kind)
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubectl with kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Update deployment image
        run: |
          # Update to newly built image using commit SHA
          kubectl set image deployment/wisecow-deployment \
            wisecow=${{ secrets.DOCKER_USERNAME }}/wisecow:${{ github.sha }}

          # Wait for rollout to complete
          kubectl rollout status deployment/wisecow-deployment --timeout=120s

      - name: Verify deployment
        run: |
          kubectl get pods
          kubectl get services
